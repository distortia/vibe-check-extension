<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vibe Check</title>
  <link rel="stylesheet" href="popup.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container" id="container">
    <p class="label">the vibes are</p>
    <div class="score-row">
      <button type="button" class="nudge nudge-minus" id="decrement" aria-label="decrease vibes">−</button>
      <p class="score" id="score">--</p>
      <button type="button" class="nudge nudge-plus" id="increment" aria-label="increase vibes">+</button>
    </div>
    <p class="vibe-message" id="vibeMessage"></p>
    <p class="out-of">out of 100</p>
    <button type="button" class="again" id="again">check again</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
